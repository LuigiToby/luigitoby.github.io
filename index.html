<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Luis Alejandro Rodríguez Arenas — Mechanical Engineering, Computational Mathematics." />
  <link rel="icon" href="assets/profile.jpg" type="image/x-icon">
  <title>main</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="site">

  <!-- ─── Header ─── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="header-name">main</a>
      <nav class="header-nav">
        <a href="projects/" class="nav-link">projects</a>
        <a href="playground/" class="nav-link">bookshelf</a>
      </nav>
      <div class="header-controls">
        <button id="mode-toggle" class="ctrl-btn" aria-label="Toggle theme">○</button>
        <button id="lang-toggle" class="ctrl-btn" aria-label="Switch language">EN</button>
      </div>
    </div>
  </header>

  <!-- ─── Main ─── -->
  <main class="page-content">
    <div class="home-grid">

      <!-- Primary column — personal -->
      <div class="home-primary">

        <!-- Identity -->
        <section class="identity">
          <img src="assets/profile.jpg" alt="Luis Alejandro Rodríguez Arenas" class="profile-img" />
          <div>
            <h1 class="name" id="typewriter"></h1>
            <p class="subtitle" id="major">Mechanical Engineering · Computational Mathematics</p>
          </div>
        </section>

        <hr class="rule">

        <!-- Bio -->
        <section>
          <span class="section-label" id="bio-label">About</span>
          <div id="bio-text" class="bio-content">Loading…</div>
        </section>

      </div>

      <!-- Secondary column — directory / control panel -->
      <aside class="home-panel">

        <!-- CV -->
        <section class="panel-block">
          <span class="section-label" id="cv-label">CV</span>
          <div class="cv-cards">

            <div class="cv-card" data-cv="academic" role="link" tabindex="0">

              <div class="cv-card-head">

                <div class="cv-card-title">
                  <span id="cv-academic">Open Academic CV</span>
                  <span class="cv-card-arrow" aria-hidden="true">↗</span>
                </div>

                <div class="seg" data-active="en" role="group" aria-label="Academic CV language">
                  <span class="seg-thumb" aria-hidden="true"></span>
                  <button type="button" class="seg-btn" data-lang="en" aria-pressed="true">EN</button>
                  <button type="button" class="seg-btn" data-lang="es" aria-pressed="false">ES</button>
                  <button type="button" class="seg-btn" data-lang="fr" aria-pressed="false">FR</button>
                </div>

              </div>

            </div>



            <div class="cv-card" data-cv="corporate" role="link" tabindex="0">

              <div class="cv-card-head">

                <div class="cv-card-title">
                  <span id="cv-corporate">Open Corporate CV</span>
                  <span class="cv-card-arrow" aria-hidden="true">↗</span>
                </div>

                <div class="seg" data-active="en" role="group" aria-label="Corporate CV language">
                  <span class="seg-thumb" aria-hidden="true"></span>
                  <button type="button" class="seg-btn" data-lang="en" aria-pressed="true">EN</button>
                  <button type="button" class="seg-btn" data-lang="es" aria-pressed="false">ES</button>
                  <button type="button" class="seg-btn" data-lang="fr" aria-pressed="false">FR</button>
                </div>

              </div>

            </div>

        </section>

        <!-- Explore -->
        <section class="panel-block">
          <span class="section-label" id="explore-label">Explore</span>
          <div class="section-links">
            <a class="section-link" href="projects/">
              <span class="section-link-title" id="explore-projects">Projects</span>
              <span class="section-link-desc" id="explore-projects-desc">Things I build</span>
            </a>
            <a class="section-link" href="playground/">
              <span class="section-link-title" id="explore-playground">bookshelf</span>
              <span class="section-link-desc" id="explore-playground-desc">Things I enjoy</span>
            </a>
          </div>
        </section>

        <!-- Links -->
        <section class="panel-block">
          <span class="section-label" id="links-label">Links</span>
          <div class="link-list">
            <a class="link-item" href="https://www.linkedin.com/in/luisarodriguezarenas/" target="_blank" rel="noopener noreferrer">
              <span class="link-code">[LI]</span>
              <span class="link-name">LinkedIn</span>
            </a>
            <a class="link-item" href="https://github.com/luigitoby" target="_blank" rel="noopener noreferrer">
              <span class="link-code">[GH]</span>
              <span class="link-name">GitHub</span>
            </a>
            <a class="link-item" href="https://www.youtube.com/@LuigiToby" target="_blank" rel="noopener noreferrer">
              <span class="link-code">[YT]</span>
              <span class="link-name">YouTube</span>
            </a>
            <a class="link-item" href="https://vsco.co/luigitoby/gallery" target="_blank" rel="noopener noreferrer">
              <span class="link-code">[VC]</span>
              <span class="link-name">VSCO</span>
            </a>
            <a class="link-item" href="mailto:alejandro.rodriguez3386@gmail.com">
              <span class="link-code">[ML]</span>
              <span class="link-name" id="links-email">Email</span>
            </a>
          </div>
        </section>

      </aside>

    </div>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-text">Luis Alejandro Rodríguez Arenas</span>
    </div>
  </footer>

</div>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // ── Typewriter ──────────────────────────────────────────────
  const FULL_NAME = 'Luis Alejandro Rodríguez Arenas';
  const nameEl    = document.getElementById('typewriter');
  let charIndex   = 0;

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  function typeWriter() {
    nameEl.textContent = FULL_NAME.slice(0, charIndex);
    nameEl.appendChild(cursor);
    if (charIndex < FULL_NAME.length) {
      charIndex++;
      setTimeout(typeWriter, 75);
    } else {
      // Hold cursor briefly, then remove it
      setTimeout(() => cursor.remove(), 1200);
    }
  }

  typeWriter();

  // ── Translations ────────────────────────────────────────────
  const T = {
    en: {
      major:               'Mechanical Engineering · Computational Mathematics',
      bioLabel:            'About',
      bioFile:             'assets/bio.en.md',
      cvLabel:             'CV',
      cvOpenAcademic:      'Open Academic CV',
      cvOpenCorporate:     'Open Corporate CV',
      exploreLabel:        'Explore',
      exploreProjects:     'Projects',
      exploreProjectsDesc: 'Things I build',
      explorePlayground:   'Bookshelf',
      explorePlayDesc:     'Things I enjoy',
      linksLabel:          'Links',
      linksEmail:          'Email',
    },
    es: {
      major:               'Ingeniería Mecánica · Matemáticas Computacionales',
      bioLabel:            'Sobre mí',
      bioFile:             'assets/bio.es.md',
      cvLabel:             'CV',
      cvOpenAcademic:      'Abrir CV Académico',
      cvOpenCorporate:     'Abrir CV Corporativo',
      exploreLabel:        'Explorar',
      exploreProjects:     'Proyectos',
      exploreProjectsDesc: 'Cosas que construyo',
      explorePlayground:   'Bookshelf',
      explorePlayDesc:     'Cosas que me gustan',
      linksLabel:          'Links',
      linksEmail:          'Correo',
    },
    fr: {
      major:               'Génie mécanique · Mathématiques computationnelles',
      bioLabel:            'À propos',
      bioFile:             'assets/bio.fr.md',
      cvLabel:             'CV',
      cvOpenAcademic:      'Ouvrir le CV Académique',
      cvOpenCorporate:     'Ouvrir le CV Entreprise',
      exploreLabel:        'Explorer',
      exploreProjects:     'Projets',
      exploreProjectsDesc: 'Ce que je construis.',
      explorePlayground:   'Bookshelf',
      explorePlayDesc:     'Ce que j\'aime',
      linksLabel:          'Liens',
      linksEmail:          'E-mail',
    }
  };

  // ── CV cards ─────────────────────────────────────────────────
  // Each card IS the action — clicking or pressing Enter/Space
  // anywhere on it (outside the segmented control) opens the PDF
  // for whichever language is currently selected. The segmented
  // control is a nested, independent control: clicks inside it
  // are caught and stopped before they reach the card's handler.
  // Site-wide language changes reset both cards' selected PDF
  // language back to that language (their default), per spec.
  const cvCards = document.querySelectorAll('.cv-card');

  function setCardLang(cardEl, lang) {
    const type = cardEl.dataset.cv;
    const seg  = cardEl.querySelector('.seg');

    seg.dataset.active = lang;
    seg.querySelectorAll('.seg-btn').forEach(btn => {
      btn.setAttribute('aria-pressed', btn.dataset.lang === lang ? 'true' : 'false');
    });

    cardEl.dataset.href = `cv/output/${type}_${lang}.pdf`;
  }

  function openCard(cardEl) {
    const a = document.createElement('a');
    a.href = cardEl.dataset.href;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  cvCards.forEach(card => {
    card.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        setCardLang(card, btn.dataset.lang);
      });
    });

    card.addEventListener('click', (e) => {
      if (e.target.closest('.seg')) return;
      openCard(card);
    });

    card.addEventListener('keydown', (e) => {
      if (e.target.closest('.seg')) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openCard(card);
      }
    });
  });

  function syncCvLang(lang) {
    cvCards.forEach(card => setCardLang(card, lang));
  }

  // ── Translations ────────────────────────────────────────────
  function setLang(lang) {
    const t = T[lang];
    document.documentElement.lang = lang;

    document.getElementById('major').textContent                = t.major;
    document.getElementById('bio-label').textContent            = t.bioLabel;
    document.getElementById('cv-label').textContent             = t.cvLabel;
    document.getElementById('cv-academic').textContent          = t.cvOpenAcademic;
    document.getElementById('cv-corporate').textContent         = t.cvOpenCorporate;
    document.getElementById('explore-label').textContent        = t.exploreLabel;
    document.getElementById('explore-projects').textContent     = t.exploreProjects;
    document.getElementById('explore-projects-desc').textContent = t.exploreProjectsDesc;
    document.getElementById('explore-playground').textContent   = t.explorePlayground;
    document.getElementById('explore-playground-desc').textContent = t.explorePlayDesc;
    document.getElementById('links-label').textContent          = t.linksLabel;
    document.getElementById('links-email').textContent          = t.linksEmail;

    syncCvLang(lang);
    document.querySelector('.cv-card[data-cv="academic"]').setAttribute('aria-label', t.cvOpenAcademic);
    document.querySelector('.cv-card[data-cv="corporate"]').setAttribute('aria-label', t.cvOpenCorporate);

    const bioEl = document.getElementById('bio-text');
    bioEl.textContent = '…';
    fetch(t.bioFile)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(md  => { bioEl.innerHTML = marked.parse(md); })
      .catch(()  => { bioEl.textContent = 'Could not load bio.'; });
  }

  const LANGS   = ['en', 'es', 'fr'];
  let   langIdx = 0;
  const langBtn = document.getElementById('lang-toggle');

  langBtn.addEventListener('click', () => {
    langIdx = (langIdx + 1) % LANGS.length;
    langBtn.textContent = LANGS[langIdx].toUpperCase();
    setLang(LANGS[langIdx]);
  });

  setLang(LANGS[langIdx]);

  // ── Theme toggle ─────────────────────────────────────────────
  const modeBtn = document.getElementById('mode-toggle');

  function applyTheme(isLight) {
    document.body.classList.toggle('light-mode', isLight);
    modeBtn.textContent = isLight ? '●' : '○';
  }

  applyTheme(localStorage.getItem('mode') === 'light');

  modeBtn.addEventListener('click', () => {
    const isLight = !document.body.classList.contains('light-mode');
    applyTheme(isLight);
    localStorage.setItem('mode', isLight ? 'light' : 'dark');
  });

});
</script>

</body>
</html>
